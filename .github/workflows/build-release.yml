name: Build and release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_component:
        description: Component repository that requested this rebuild
        required: false
        type: string
      source_version:
        description: Component release tag that requested this rebuild
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ck-free-toolbox-release
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows package
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout toolbox
        uses: actions/checkout@v5
      - name: Prepare automatic version
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $releaseVersion = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME.TrimStart('v') } else { "1.0.$env:GITHUB_RUN_NUMBER" }
          if ($releaseVersion -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') { throw "Invalid release version: $releaseVersion" }
          $releaseTag = "v$releaseVersion"
          "CK_RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CK_RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $quote = [char]34
          $launcherPath = '.\launcher\CKFreeToolboxLauncher.cs'
          $launcher = Get-Content -LiteralPath $launcherPath -Raw -Encoding UTF8
          $launcher = $launcher -replace 'AssemblyVersion\("[0-9.]+"\)', ('AssemblyVersion(' + $quote + $releaseVersion + '.0' + $quote + ')')
          $launcher = $launcher -replace 'AssemblyFileVersion\("[0-9.]+"\)', ('AssemblyFileVersion(' + $quote + $releaseVersion + '.0' + $quote + ')')
          [IO.File]::WriteAllText((Resolve-Path $launcherPath), $launcher, (New-Object Text.UTF8Encoding($false)))
          $mainPath = '.\CKFreeToolbox.ps1'
          $main = Get-Content -LiteralPath $mainPath -Raw -Encoding UTF8
          $main = $main -replace 'Text="v[0-9]+\.[0-9]+\.[0-9]+"', ('Text=' + $quote + 'v' + $releaseVersion + $quote)
          [IO.File]::WriteAllText((Resolve-Path $mainPath), $main, (New-Object Text.UTF8Encoding($true)))
          $workerPath = '.\app\workers\ComponentWorker.ps1'
          $worker = Get-Content -LiteralPath $workerPath -Raw -Encoding UTF8
          $worker = $worker -replace 'CKFreeToolbox/[0-9]+\.[0-9]+\.[0-9]+', "CKFreeToolbox/$releaseVersion"
          [IO.File]::WriteAllText((Resolve-Path $workerPath), $worker, (New-Object Text.UTF8Encoding($true)))
          $selfWorkerPath = '.\app\workers\SelfUpdateWorker.ps1'
          $selfWorker = Get-Content -LiteralPath $selfWorkerPath -Raw -Encoding UTF8
          $selfWorker = $selfWorker -replace 'CKFreeToolbox/[0-9]+\.[0-9]+\.[0-9]+', "CKFreeToolbox/$releaseVersion"
          [IO.File]::WriteAllText((Resolve-Path $selfWorkerPath), $selfWorker, (New-Object Text.UTF8Encoding($true)))

      - name: Validate PowerShell syntax
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $errors = @()
          $files = Get-ChildItem -Recurse -File -Include *.ps1,*.psm1 |
            Where-Object { $_.FullName -notmatch '[\\/]dist[\\/]' }
          foreach ($file in $files) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$tokens,
              [ref]$parseErrors
            )
            if ($parseErrors.Count) {
              $errors += $parseErrors | ForEach-Object { "$($file.FullName): $($_.Message)" }
            }
          }
          if ($errors.Count) {
            throw ($errors -join [Environment]::NewLine)
          }
          Write-Host "PowerShell syntax passed: $($files.Count) files"

      - name: Build lightweight client
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          & powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tools\Build-ReleasePackage.ps1
          if ($LASTEXITCODE -ne 0) {
            throw "Release builder exited with code $LASTEXITCODE"
          }

      - name: Bundle latest default components
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $basePackages = @(Get-ChildItem -LiteralPath .\dist -Directory)
          if ($basePackages.Count -ne 1) {
            throw "Expected one base package, found $($basePackages.Count)."
          }
          & powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tools\Build-BundledComponents.ps1 -BasePackagePath $basePackages[0].FullName
          if ($LASTEXITCODE -ne 0) {
            throw "Component bundler exited with code $LASTEXITCODE"
          }

      - name: Verify release package
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $archives = @(Get-ChildItem -LiteralPath .\dist -Filter *.zip -File)
          if ($archives.Count -ne 1) {
            throw "Expected one release ZIP, found $($archives.Count)."
          }
          $packages = @(Get-ChildItem -LiteralPath .\dist -Directory)
          if ($packages.Count -ne 1) {
            throw "Expected one release directory, found $($packages.Count)."
          }

          $package = $packages[0].FullName
          $manifestPath = Join-Path $package 'package-manifest.json'
          $manifest = Get-Content -LiteralPath $manifestPath -Raw -Encoding UTF8 | ConvertFrom-Json
          if ([string]$manifest.flavor -ne 'standard') {
            throw "Expected standard package flavor, found: $($manifest.flavor)"
          }
          $required = @(
            [string]$manifest.entry,
            'CKFreeToolbox.ps1',
            'app\modules\ToolboxConfig.psm1',
            'app\config\tools.json',
            'app\workers\ComponentWorker.ps1',
            'app\workers\SelfUpdateWorker.ps1',
            'app\workers\ApplyToolboxUpdate.ps1',
            'app\pages\ModelRenderPage.ps1',
            'app\pages\NuiWallfixPage.ps1',
            'app\pages\RpfToFivemPage.ps1',
            'app\pages\AntiJohnPage.ps1',
            'app\pages\XiaohaCleanerPage.ps1',
            'package-manifest.json'
          )
          foreach ($relativePath in $required) {
            if (-not (Test-Path -LiteralPath (Join-Path $package $relativePath) -PathType Leaf)) {
              throw "Missing release file: $relativePath"
            }
          }

          $toolConfig = Get-Content -LiteralPath (Join-Path $package 'app\config\tools.json') -Raw -Encoding UTF8 |
            ConvertFrom-Json
          foreach ($tool in $toolConfig) {
            if (-not $tool.component.releaseAssetPattern) {
              throw "Missing releaseAssetPattern for component: $($tool.id)"
            }
            if ($tool.component.PSObject.Properties['branch']) {
              throw "Source branch configuration is forbidden: $($tool.id)"
            }
          }
          $workerSource = Get-Content -LiteralPath (Join-Path $package 'app\workers\ComponentWorker.ps1') -Raw -Encoding UTF8
          if ($workerSource -match 'api\.github\.com|codeload\.github\.com|/commits/') {
            throw 'Source archive download code is forbidden.'
          }
          $forbidden = Get-ChildItem -LiteralPath $package -Recurse -File |
            Where-Object { $_.Name -in @('blender.exe', 'python.exe', '_texture_report.txt') }
          if ($forbidden -or (Test-Path -LiteralPath (Join-Path $package 'runtime\blender'))) {
            throw 'Forbidden runtime or report file was bundled in the release.'
          }
          if (Test-Path -LiteralPath (Join-Path $package 'config.json') -PathType Leaf) {
            throw 'User config.json must not be bundled in the release.'
          }
          foreach ($componentDirectory in @('vehicle_renderer', 'nui-wallfix', 'rpf_to_fivem')) {
            if (Test-Path -LiteralPath (Join-Path $package $componentDirectory)) {
              throw "Unexpected bundled component: $componentDirectory"
            }
          }

          foreach ($toolId in @('anti-john', 'xiaoha-cleaner')) {
            $tool = @($toolConfig | Where-Object { [string]$_.id -eq $toolId })[0]
            $componentRoot = Join-Path $package ([string]$tool.component.installDir)
            if (-not (Test-Path -LiteralPath $componentRoot -PathType Container)) {
              throw "Bundled component directory missing: $toolId"
            }
            foreach ($relativePath in @($tool.component.requiredFiles)) {
              if (-not (Test-Path -LiteralPath (Join-Path $componentRoot ([string]$relativePath)) -PathType Leaf)) {
                throw "Bundled component file missing: $toolId/$relativePath"
              }
            }
            $localManifest = Get-Content -LiteralPath (Join-Path $componentRoot '.ck-component.json') -Raw -Encoding UTF8 |
              ConvertFrom-Json
            $recordProperty = $manifest.bundledComponents.PSObject.Properties[$toolId]
            if (-not $recordProperty) {
              throw "Package manifest missing bundled component record: $toolId"
            }
            $record = $recordProperty.Value
            if (
              [string]$localManifest.releaseTag -ne [string]$record.releaseTag -or
              [string]$localManifest.sha256 -ne [string]$record.sha256 -or
              [string]$localManifest.repo -ne [string]$record.repo -or
              [string]$localManifest.source -ne 'bundled-github-release' -or
              [string]$record.sha256 -notmatch '^[0-9a-f]{64}$'
            ) {
              throw "Bundled component manifest mismatch: $toolId"
            }
          }
          if (-not $manifest.bundled.antiJohn -or -not $manifest.bundled.xiaohaCleaner) {
            throw 'Standard package bundled flags are incomplete.'
          }

          Write-Host "Release ZIP: $($archives[0].Name)"
          Write-Host "SHA-256: $((Get-FileHash -Algorithm SHA256 -LiteralPath $archives[0].FullName).Hash)"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CK-Free-Toolbox-${{ github.sha }}
          path: dist/*.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Check release version
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $manifestPaths = @(Get-ChildItem -LiteralPath .\dist -Directory | ForEach-Object {
            Join-Path $_.FullName 'package-manifest.json'
          })
          if ($manifestPaths.Count -ne 1) {
            throw "Expected one package manifest, found $($manifestPaths.Count)."
          }
          $manifest = Get-Content -LiteralPath $manifestPaths[0] -Raw -Encoding UTF8 | ConvertFrom-Json
          if ([string]$manifest.version -ne $env:CK_RELEASE_VERSION) {
            throw "Release version $env:CK_RELEASE_VERSION does not match package version $($manifest.version)."
          }
          if ([string]$manifest.flavor -ne 'standard') {
            throw "Only the standard bundled package may be released, found: $($manifest.flavor)"
          }
      - name: Publish GitHub release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $sourceArchives = @(Get-ChildItem -LiteralPath .\dist -Filter *.zip -File)
          if ($sourceArchives.Count -ne 1) {
            throw "Expected exactly one release ZIP, found $($sourceArchives.Count)."
          }
          $assetName = "CK-Free-Toolbox-$($env:CK_RELEASE_TAG).zip"
          $releaseArchive = Join-Path (Resolve-Path .\dist) $assetName
          Copy-Item -LiteralPath $sourceArchives[0].FullName -Destination $releaseArchive -Force
          $checksumPath = "$releaseArchive.sha256"
          $archiveHash = (Get-FileHash -LiteralPath $releaseArchive -Algorithm SHA256).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText(
            $checksumPath,
            "$archiveHash  $assetName" + [Environment]::NewLine,
            (New-Object Text.ASCIIEncoding)
          )

          $ErrorActionPreference = 'SilentlyContinue'
          gh release view $env:CK_RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          $releaseExists = ($LASTEXITCODE -eq 0)
          $ErrorActionPreference = 'Stop'
          if ($releaseExists) {
            $existingAssets = @(gh release view $env:CK_RELEASE_TAG --repo $env:GITHUB_REPOSITORY --json assets --jq '.assets[].name')
            foreach ($existingAsset in $existingAssets) {
              if (-not [string]::IsNullOrWhiteSpace($existingAsset)) {
                gh release delete-asset $env:CK_RELEASE_TAG $existingAsset --yes --repo $env:GITHUB_REPOSITORY
                if ($LASTEXITCODE -ne 0) {
                  throw "Failed to remove existing release asset: $existingAsset"
                }
              }
            }
            gh release upload $env:CK_RELEASE_TAG $releaseArchive $checksumPath --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $env:CK_RELEASE_TAG $releaseArchive $checksumPath --target $env:GITHUB_SHA --title $env:CK_RELEASE_TAG --generate-notes --repo $env:GITHUB_REPOSITORY
          }
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release command exited with code $LASTEXITCODE"
          }
